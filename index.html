<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>BOR</title>
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link href="https://fonts.googleapis.com/css2?family=Silkscreen&display=swap" rel="stylesheet" />
    <style>
      * {
        margin: 0;
        padding: 0;
        box-sizing: border-box;
      }

      body {
        min-height: 100vh;
        background-color: #e0e0e0;
        display: flex;
        align-items: center;
        justify-content: center;
        padding: 32px;
      }

      .card {
        width: 100%;
        max-width: 1200px;
        min-height: 80vh;
        background-color: #141414;
        border-radius: 24px;
        overflow: hidden;
        display: grid;
        grid-template-areas:
          "header    header    header    header"
          "left      center-t  center-t  right"
          "left      mid-l     mid-r     right";
        grid-template-columns: 1fr 2fr 2fr 1fr;
        grid-template-rows: 60px 1fr 1fr;
      }

      .header {
        grid-area: header;
        border-bottom: 0.1px solid #e0e0e0;
        display: flex;
        align-items: center;
        justify-content: space-between;
        padding: 0 24px;
        font-family: "Silkscreen", monospace;
      }

      .nav-brand {
        color: #e0e0e0;
        font-size: 18px;
        letter-spacing: 0.05em;
      }

      .nav-links {
        display: flex;
        align-items: center;
        gap: 10px;
        font-size: 12px;
        letter-spacing: 0.08em;
      }

      .nav-links a {
        color: #e0e0e0;
        text-decoration: none;
        transition: color 0.2s ease;
      }

      .nav-links a:hover {
        color: #83bc91;
      }

      .nav-links a.active {
        color: #83bc91;
      }

      .nav-sep {
        color: #e0e0e0;
        user-select: none;
      }

      .nav-icon {
        display: flex;
        align-items: center;
      }

      .left      { grid-area: left;     border-right:  0.1px solid #e0e0e0; }
      .center-t  { grid-area: center-t; border-bottom: 0.1px solid #e0e0e0; }
      .mid-l     { grid-area: mid-l;    border-right:  0.1px solid #e0e0e0; }
      .mid-r     { grid-area: mid-r; }
      .right     { grid-area: right;    border-left:   0.1px solid #e0e0e0; }
    </style>
  </head>
  <body>
    <div class="card">
      <div class="header">
        <span class="nav-brand">BOR</span>

        <nav class="nav-links">
          <a href="#" class="active">HOME</a>
          <span class="nav-sep">/</span>
          <a href="#">PRICING</a>
          <span class="nav-sep">/</span>
          <a href="#">PRIVACY</a>
          <span class="nav-sep">/</span>
          <a href="#">TERMS</a>
        </nav>

        <div class="nav-icon">
          <img src="skelly-green.png" alt="BOR mascot" width="24" height="24" style="image-rendering: pixelated;" />
        </div>
      </div>

      <div class="left"></div>
      <div class="center-t"></div>
      <div class="mid-l"></div>
      <div class="mid-r"></div>
      <div class="right"></div>
    </div>
    <script>
      const navLinks = document.querySelectorAll('.nav-links a');
      navLinks.forEach(link => {
        link.addEventListener('click', e => {
          e.preventDefault();
          navLinks.forEach(l => l.classList.remove('active'));
          link.classList.add('active');
        });
      });
    </script>
  </body>
</html>
